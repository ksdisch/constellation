# Fly.io config for the Constellation relay (the only server-side component).
# Deploy with: fly launch --no-deploy  (first time, to create the app), then
# fly deploy.  Pick your own app name + primary_region.
app = "constellation-relay"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"

# TLS-terminated HTTP service. WebSocket upgrades pass through; force_https means
# clients connect via wss:// on 443. Point VITE_RELAY_URL at
# wss://<app>.fly.dev for the client build.
[http_service]
  internal_port = 8080
  force_https = true
  # Scale to zero when idle (free-tier friendly); the first connection cold-starts
  # the machine. Set min_machines_running = 1 if you want instant joins.
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
